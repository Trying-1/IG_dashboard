name: Daily Instagram Tracker

on:
  schedule:
    - cron: '30 3 * * *' # 9:00 AM IST (approx)
  workflow_dispatch: # Allow manual trigger

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          SOURCE_ID: ${{ secrets.SOURCE_ID }}
        run: python core/follower_tracker.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html activity.html
          git commit -m "Automated daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
